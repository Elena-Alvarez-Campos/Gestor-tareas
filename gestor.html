<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gestor de tareas</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='css/style-gestor.css'>
    <script src='main.js'></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>
    <h2>Gestor de tareas</h2>
    <button id="nuevaTarea">+Nuevo</button>
    <button id="modo">Modo</button>
    <article>
        <div id="ejemplo" class="0">
            <input type="text" class="campo-texto" placeholder="Título de la tarea">
            <textarea name="text" class="des-tarea" placeholder="Añade la tarea" rows="auto"></textarea>
            <div id="botones">
                <button class="completado">Completada</button>
                <button class="incompletado">Incompletada</button>
                <button class="eliminar">Eliminar</button>

            </div>
        </div>
    </article>
    <script src="js/script.js"></script>
</body>
</html>
